<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Downloading CV...</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif}

body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#f5f9fd;
}

.card{
    background:#fff;
    padding:40px;
    border-radius:22px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,.08);
    max-width:520px;
    width:90%;
}

.icon{
    width:80px;
    height:80px;
    margin:0 auto 20px;
    border-radius:50%;
    background:#e8f4ff;
    color:#0060AE;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
}

h2{color:#111827;margin-bottom:10px}
p{color:#6b7280;line-height:1.7}

.loader{
    margin:22px auto 0;
    width:42px;
    height:42px;
    border:4px solid #dbeafe;
    border-top:4px solid #0060AE;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

.actions{
    display:none;
    margin-top:26px;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
}

.btn{
    padding:12px 22px;
    border-radius:10px;
    text-decoration:none;
    font-weight:600;
    color:#fff;
}

.back-btn{background:#0060AE}
.open-btn{background:#111827}

@keyframes spin{
    100%{transform:rotate(360deg)}
}
</style>
</head>

<body>

<div class="card">
    <div class="icon" id="icon">📄</div>

    <h2 id="title">CV Download Started</h2>

    <p id="message">
        Your CV is being downloaded automatically. Please wait a moment.
    </p>

    <div class="loader" id="loader"></div>

    <div class="actions" id="actions">
        <a href="../index.html" class="btn back-btn">← Back to Portfolio</a>
        <a href="../assets/cv/Ammar Shahid Resume (1).pdf" target="_blank" class="btn open-btn">Open CV</a>
    </div>
</div>
<script>
window.addEventListener("load", function () {
    const cvPath = "../assets/cv/Ammar Shahid Resume (1).pdf";

    setTimeout(function () {
        const link = document.createElement("a");
        link.href = cvPath;
        link.download = "Ammar-Shahid-CV.pdf";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }, 700);

    setTimeout(function () {
        document.getElementById("icon").innerHTML = "✅";
        document.getElementById("title").innerText = "Download Completed";
        document.getElementById("message").innerText =
            "Your CV has been downloaded successfully. If it did not start, click Open CV.";
        document.getElementById("loader").style.display = "none";
        document.getElementById("actions").style.display = "flex";
    }, 2500);
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social FAB</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #e0e7ff 0%, #f0f4ff 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', sans-serif;
  }

  /* ── FAB Root ── */
  .fab-root {
    position: fixed;
    bottom: 36px;
    right: 36px;
    display: flex;
    align-items: center;
    z-index: 999;
  }

  /* ── Icons Row (opens to LEFT) ── */
  .fab-icons {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 10px;
    margin-right: 14px;
    pointer-events: none;
  }

  /* ── Single Icon ── */
  .fab-icon {
    position: relative;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
    box-shadow: 0 4px 18px rgba(0,0,0,0.13);
    opacity: 0;
    transform: translateX(30px) scale(0.7);
    transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s ease;
    pointer-events: none;
  }

  .fab-icon svg {
    width: 20px; height: 20px;
    transition: transform 0.3s ease;
  }

  /* brand fills */
  .fab-icon.whatsapp svg { fill: #25D366; }
  .fab-icon.github   svg { fill: #24292e; }
  .fab-icon.fiverr   svg { fill: #1DBF73; }
  .fab-icon.linkedin svg { fill: #0A66C2; }
  .fab-icon.email    svg { fill: #EA4335; }

  .fab-icon:hover { box-shadow: 0 8px 28px rgba(0,0,0,0.2); }
  .fab-icon:hover svg { transform: scale(1.18); }

  /* ── Colorful Tooltip ABOVE each icon ── */
  .fab-icon::after {
    content: attr(data-label);
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%) translateY(4px);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.4px;
    white-space: nowrap;
    color: #fff;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  .fab-icon:hover::after {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  /* tooltip arrow */
  .fab-icon::before {
    content: '';
    position: absolute;
    bottom: calc(100% + 4px);
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .fab-icon:hover::before { opacity: 1; }

  /* individual tooltip colors */
  .fab-icon.whatsapp::after { background: linear-gradient(135deg,#25D366,#128C7E); }
  .fab-icon.whatsapp::before { border-top-color: #128C7E; }

  .fab-icon.github::after   { background: linear-gradient(135deg,#24292e,#555); }
  .fab-icon.github::before  { border-top-color: #555; }

  .fab-icon.fiverr::after   { background: linear-gradient(135deg,#1DBF73,#19a463); }
  .fab-icon.fiverr::before  { border-top-color: #19a463; }

  .fab-icon.linkedin::after { background: linear-gradient(135deg,#0A66C2,#0057ad); }
  .fab-icon.linkedin::before{ border-top-color: #0057ad; }

  .fab-icon.email::after    { background: linear-gradient(135deg,#EA4335,#c5352a); }
  .fab-icon.email::before   { border-top-color: #c5352a; }

  /* staggered open */
  .fab-root.open .fab-icons { pointer-events: all; }
  .fab-root.open .fab-icon  {
    opacity: 1;
    transform: translateX(0) scale(1);
    pointer-events: all;
  }
  .fab-root.open .fab-icon:nth-child(5) { transition-delay: 0.04s; }
  .fab-root.open .fab-icon:nth-child(4) { transition-delay: 0.09s; }
  .fab-root.open .fab-icon:nth-child(3) { transition-delay: 0.14s; }
  .fab-root.open .fab-icon:nth-child(2) { transition-delay: 0.19s; }
  .fab-root.open .fab-icon:nth-child(1) { transition-delay: 0.24s; }

  /* ── Main Toggle Button ── */
  .fab-toggle {
    position: relative;
    width: 56px; height: 56px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background: linear-gradient(135deg, #6366f1, #3b82f6);
    box-shadow: 0 6px 22px rgba(99,102,241,0.5);
    display: flex; align-items: center; justify-content: center;
    transition: box-shadow 0.3s ease, transform 0.3s ease;
    z-index: 2;
    flex-shrink: 0;
  }
  .fab-toggle:hover {
    transform: scale(1.07);
    box-shadow: 0 10px 32px rgba(99,102,241,0.65);
  }
  .fab-toggle svg {
    width: 24px; height: 24px; fill: #fff;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .fab-root.open .fab-toggle svg { transform: rotate(45deg); }

  /* ── Ripple / Pulse ring behind toggle ── */
  .fab-toggle::before,
  .fab-toggle::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: rgba(99,102,241,0.35);
    animation: pulse-ring 2.4s cubic-bezier(0.215,0.61,0.355,1) infinite;
  }
  .fab-toggle::after  { animation-delay: 1.2s; }

  @keyframes pulse-ring {
    0%   { transform: scale(1);   opacity: 0.7; }
    80%  { transform: scale(1.9); opacity: 0; }
    100% { transform: scale(1.9); opacity: 0; }
  }
  /* stop pulse when open */
  .fab-root.open .fab-toggle::before,
  .fab-root.open .fab-toggle::after { animation: none; opacity: 0; }

  /* demo hint */
  .hint {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    text-align: center; color: #94a3b8;
    font-size: 14px; pointer-events: none;
    user-select: none;
  }
  .hint span { font-size: 32px; display: block; margin-bottom: 8px; }
</style>
</head>
<body>

<p class="hint"><span>👉</span>Bottom-right button click karo</p>

  </div>

  <!-- Toggle with headphone icon -->
  <button class="fab-toggle" id="fabToggle" aria-label="Toggle social links">
    <!-- headphone icon (closed state) -->
    <svg id="iconDefault" viewBox="0 0 24 24" style="position:absolute;transition:opacity 0.3s,transform 0.3s;">
      <path d="M12 3a9 9 0 0 0-9 9v7c0 1.1.9 2 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H4v-2a8 8 0 0 1 16 0v2h-2a2 2 0 0 0-2 2v3a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-7a9 9 0 0 0-9-9z"/>
    </svg>
    <!-- close icon (open state) -->
    <svg id="iconClose" viewBox="0 0 24 24" style="position:absolute;opacity:0;transition:opacity 0.3s,transform 0.3s;">
      <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
    </svg>
  </button>

</div>

<script>
  const fab = document.getElementById('fab');
  const toggle = document.getElementById('fabToggle');
  const iconDefault = document.getElementById('iconDefault');
  const iconClose = document.getElementById('iconClose');

  toggle.addEventListener('click', () => {
    const isOpen = fab.classList.toggle('open');
    if (isOpen) {
      iconDefault.style.opacity = '0';
      iconDefault.style.transform = 'rotate(-30deg) scale(0.7)';
      iconClose.style.opacity = '1';
      iconClose.style.transform = 'rotate(0deg) scale(1)';
    } else {
      iconDefault.style.opacity = '1';
      iconDefault.style.transform = 'rotate(0deg) scale(1)';
      iconClose.style.opacity = '0';
      iconClose.style.transform = 'rotate(30deg) scale(0.7)';
    }
  });

  document.addEventListener('click', (e) => {
    if (!fab.contains(e.target)) {
      fab.classList.remove('open');
      iconDefault.style.opacity = '1';
      iconDefault.style.transform = '';
      iconClose.style.opacity = '0';
    }
  });
</script>
</body>
</html>

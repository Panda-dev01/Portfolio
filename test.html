<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .zenora-alert{
    border-radius:24px !important;
    padding:20px !important;
    box-shadow:0 20px 60px rgba(0,96,174,.25) !important;
}

.swal2-title{
    font-size:24px !important;
    font-weight:700 !important;
}

.swal2-confirm{
    border-radius:12px !important;
    padding:12px 24px !important;
}
:root{
    --reach-primary:#0060AE;
}

.zenora-reach-btn{
    padding:12px 24px;
    border:none;
    border-radius:12px;
    background:var(--reach-primary);
    color:#fff;
    cursor:pointer;
    font-weight:600;
}

.zenora-reach-layer{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(6px);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    visibility:hidden;
    transition:.35s ease;
    z-index:99999;
}

.zenora-reach-layer.is-visible{
    opacity:1;
    visibility:visible;
}

.zenora-reach-layer.is-visible .zenora-reach-box{
    transform:translateY(0) scale(1);
}

.zenora-reach-box{
    width:100%;
    max-width:420px;
    margin:20px;
    background:#fff;
    border-radius:24px;
    padding:28px;
    position:relative;
    transform:translateY(40px) scale(.9);
    transition:.35s ease;
    box-shadow:0 20px 60px rgba(0,0,0,.15);
}

.zenora-reach-box h3{
    margin:12px 0 8px;
    text-align:center;
}

.zenora-reach-box p{
    text-align:center;
    color:#64748b;
    margin-bottom:20px;
    line-height:1.5;
}

.zenora-reach-icon{
    width:65px;
    height:65px;
    margin:auto;
    border-radius:50%;
    background:rgba(0,96,174,.12);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
}

.zenora-reach-close{
    position:absolute;
    right:15px;
    top:15px;
    width:35px;
    height:35px;
    border:none;
    border-radius:50%;
    background:#f1f5f9;
    cursor:pointer;
}

.zenora-reach-form{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.zenora-reach-form input,
.zenora-reach-form textarea{
    width:100%;
    border:1px solid #e2e8f0;
    border-radius:12px;
    padding:14px;
    outline:none;
}

.zenora-reach-form input:focus,
.zenora-reach-form textarea:focus{
    border-color:var(--reach-primary);
}

.zenora-reach-form button{
    height:50px;
    border:none;
    border-radius:12px;
    background:var(--reach-primary);
    color:#fff;
    cursor:pointer;
    font-weight:600;
}
</style>
<body>
    <!-- Trigger Button -->
    <button id="zenoraReachBtn" class="zenora-reach-btn">
        Contact Me
    </button>
    
    <!-- Modal -->
    <div id="zenoraReachLayer" class="zenora-reach-layer">
        <div class="zenora-reach-box">
    
            <button id="zenoraReachClose" class="zenora-reach-close">
                ✕
            </button>
    
            <div class="zenora-reach-icon">
                💬
            </div>
    
            <h3>Let's Talk</h3>
    
            <p>
                Have a project idea or question?
                Feel free to send a message.
            </p>
    
            <form class="zenora-reach-form">
                <input type="text" placeholder="Your Name">
                <input type="email" placeholder="Email Address">
                <textarea rows="4" placeholder="Write your message..."></textarea>
    
                <button type="submit">
                    Send Message
                </button>
            </form>
    
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const zenoraReachBtn = document.getElementById("zenoraReachBtn");
const zenoraReachLayer = document.getElementById("zenoraReachLayer");
const zenoraReachClose = document.getElementById("zenoraReachClose");

zenoraReachBtn.addEventListener("click", () => {
    zenoraReachLayer.classList.add("is-visible");
});

zenoraReachClose.addEventListener("click", () => {
    zenoraReachLayer.classList.remove("is-visible");
});

zenoraReachLayer.addEventListener("click", (e) => {
    if (e.target === zenoraReachLayer) {
        zenoraReachLayer.classList.remove("is-visible");
    }
});

const zenoraForm = document.querySelector(".zenora-reach-form");

zenoraForm.addEventListener("submit", (e) => {
    e.preventDefault();

Swal.fire({
    icon: "success",
    title: "Message Delivered 🚀",
    html: `
        <p>Your message has been successfully submitted.</p>
        <small>We'll respond as soon as possible.</small>
    `,
    confirmButtonText: "Great!",
    confirmButtonColor: "#0060AE",
    backdrop: `
        rgba(0,0,0,0.7)
    `,
    customClass: {
        popup: "zenora-alert"
    }
});
    zenoraForm.reset();
    zenoraReachLayer.classList.remove("is-visible");
});
    </script>
</body>
</html>
